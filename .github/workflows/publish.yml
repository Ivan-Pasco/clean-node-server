name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  parity:
    # Enforces host bridge parity against foundation/platform-architecture/function-registry.toml.
    # Prevents the class of incident that took down errors.cleanlanguage.dev on 2026-07-06
    # (compiler emitted _arena_scope_push/_pop imports that no host had registered).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clean-node-server
        uses: actions/checkout@v4
        with:
          path: clean-node-server

      - name: Checkout foundation (clean-language-spec)
        uses: actions/checkout@v4
        with:
          repository: Ivan-Pasco/clean-language-spec
          path: foundation

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run host-parity check
        env:
          CLEAN_LANGUAGE_ROOT: ${{ github.workspace }}
        run: |
          python3 foundation/management/scripts/check_host_parity.py \
            --host node-server --strict --verbose

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  publish:
    needs: [test, parity]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
